<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KORCAB DEMAK</title> 
    
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#244034">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        /* ===============================
           CANGKANG MATI (RIGID FRAME)
           =============================== */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* Menggunakan Dynamic Viewport Height */
            background-color: #eee;
            overflow: hidden; /* KUNCI MATI SCROLL DI SINI */
            overscroll-behavior: none; /* Cegah efek karet (bounce) di HP */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .iframe-container {
            width: 100%;
            height: 100dvh;
            display: flex;
        }

        iframe {
            flex: 1; /* Biarkan iframe mengisi sisa ruang mutlak */
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }

        /* LOADING OVERLAY */
        .loading {
            position: fixed;
            inset: 0;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #555;
            z-index: 9999;
            transition: opacity 0.4s ease; /* Efek transisi halus (fade out) */
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none; /* Mencegah interaksi saat sedang transisi hilang */
        }
    </style>
</head>

<body>
    <div id="loading" class="loading">Memuat aplikasi…</div>
    
    <div class="iframe-container">
        <iframe
            id="appFrame"
            title="Aplikasi KORCAB DEMAK"
            src="https://script.google.com/macros/s/AKfycbzP-bz2rHEtToy91wD5VG3-l7aGWCkWYfzW1ee2JqL9T6cDqKujX7yFxOv_60akc1hx/exec" 
            allowfullscreen
            loading="eager">
        </iframe>
    </div>
 
    <script>
        const iframe = document.getElementById('appFrame');
        const loading = document.getElementById('loading');

        // Sembunyikan loading saat iframe selesai dimuat
        iframe.addEventListener('load', () => {
            loading.classList.add('hidden');
            
            // Opsional: Hapus elemen dari DOM setelah animasi fade selesai agar tidak membebani memori
            setTimeout(() => {
                loading.style.display = 'none';
            }, 400); 
        });

        // DAFTARKAN SERVICE WORKER UNTUK MENGAKTIFKAN PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Terdaftar dengan sukses.'))
                    .catch(err => console.error('Gagal mendaftarkan Service Worker:', err));
            });
        }
    </script>
</body>
</html>
